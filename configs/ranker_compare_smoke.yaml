run_name: ranker_compare_smoke

input:
  ranking_dataset_base_dir: data/processed/ranking_dataset
  ranking_dataset_run_name: ranking_dataset_smoke

features:
  numeric:
    - merged_rank
    - normalized_merged_rank
    - merged_score
    - source_rank
    - source_count
    - candidate_count
    - history_length
    - history_click_count
    - topic_history_count
    - request_index_in_session
    - request_hour
  binary:
    - has_multi_source_provenance
    - has_affinity_source
    - has_trending_source
    - is_affinity_primary
    - is_trending_primary
    - is_cold_start
    - candidate_seen_in_impressions
  categorical:
    - candidate_source
    - topic

primary_variant_name: logistic_regression_baseline

comparison_models:
  logistic_regression_baseline:
    model_type: logistic_regression
    max_iter: 1000
    C: 1.0
    solver: liblinear
    random_state: 42
  random_forest_baseline:
    model_type: random_forest
    n_estimators: 100
    max_depth: 4
    min_samples_leaf: 1
    random_state: 42

diagnostics:
  history_segments:
    - name: cold_start
      min_history_length: 0
      max_history_length: 0
    - name: short_history
      min_history_length: 1
      max_history_length: 2
    - name: medium_history
      min_history_length: 3
      max_history_length: 5
    - name: long_history
      min_history_length: 6

artifacts:
  base_dir: artifacts/runs
