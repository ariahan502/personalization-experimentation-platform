run_name: experiment_analysis_smoke

input:
  assignment_base_dir: data/processed/experiment_assignment
  assignment_run_name: experiment_smoke

experiment:
  experiment_id: feed_rerank_policy_v1
  treatments:
    - treatment_id: control
      treatment_name: control_ranker_only
      weight: 0.5
      is_control: true
    - treatment_id: reranked_policy
      treatment_name: reranked_feed_policy
      weight: 0.5
      is_control: false

diagnostics:
  history_segments:
    - name: cold_start
      min_history_length: 0
      max_history_length: 0
    - name: short_history
      min_history_length: 1
      max_history_length: 2
    - name: medium_history
      min_history_length: 3
      max_history_length: 5
    - name: long_history
      min_history_length: 6

artifacts:
  base_dir: artifacts/runs
